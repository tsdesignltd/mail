<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MailDeck</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="logo">📮 MailDeck</div>
    <nav id="tabs">
      <button class="tab active" data-tab="inbox">受信</button>
      <button class="tab" data-tab="spam">迷惑候補 <span id="spamBadge" class="badge hidden">0</span></button>
      <button class="tab" data-tab="settings">設定</button>
    </nav>
    <div class="topbar-right">
      <select id="accountSelect" title="メールアカウント切替">
        <option value="all">すべてのアカウント</option>
      </select>
      <span id="syncStatus" class="sync-status"></span>
      <button id="syncBtn" class="btn primary">同期</button>
    </div>
  </header>

  <!-- 受信タブ: サムネイルタイル型ダッシュボード -->
  <main id="view-inbox" class="view">
    <div id="dash">
      <div class="dash-head">
        <div class="section-title big">★ よく使う相手</div>
        <input id="senderSearch" type="search" placeholder="差出人を検索">
      </div>
      <div id="favTiles" class="tile-grid"></div>
      <div class="all-box">
        <div class="all-head">
          <div class="section-title">すべての差出人(過去1ヶ月)</div>
          <div class="sort-btns">
            並び替え:
            <button class="sort-btn" data-sort="latest">受信日時</button>
            <button class="sort-btn" data-sort="name">名前</button>
            <button class="sort-btn" data-sort="addr">メールアドレス</button>
          </div>
        </div>
        <div id="allList" class="all-list"></div>
      </div>
    </div>

    <!-- メッセンジャー画面 (タイルクリックで表示) -->
    <section id="threadOverlay" class="hidden">
      <div id="threadHeader">
        <button id="backBtn" class="btn small">← 一覧に戻る</button>
        <div class="thread-title">
          <div id="threadName"></div>
          <div id="threadAddr"></div>
        </div>
        <div class="thread-actions">
          <button id="pinBtn" class="btn small">★ よく使う相手に追加</button>
          <button id="blockBtn" class="btn small danger">⛔ ブロック</button>
        </div>
      </div>
      <div id="bubbles"></div>
    </section>
  </main>

  <!-- 迷惑候補タブ -->
  <main id="view-spam" class="view hidden">
    <div class="spam-wrap">
      <div class="spam-toolbar">
        <label><input type="checkbox" id="checkAllSpam"> 高確度をすべて選択</label>
        <button id="moveSpamBtn" class="btn danger">選択したメールを「<span class="mbname"></span>」へ仕訳</button>
        <button id="aiJudgeBtn" class="btn hidden">🤖 グレーゾーンをAI判定</button>
      </div>
      <h2>迷惑メール(高確度) <span id="spamCount" class="count"></span></h2>
      <div id="spamItems" class="mail-items"></div>
      <h2>グレーゾーン(要確認) <span id="greyCount" class="count"></span></h2>
      <p class="hint">判断に迷うメールです。「迷惑」にすると差出人がブロックリストに、「問題なし」にすると信頼リストに学習されます。</p>
      <div id="greyItems" class="mail-items"></div>
    </div>
  </main>

  <!-- 設定タブ -->
  <main id="view-settings" class="view hidden">
    <div class="settings-wrap">
      <h2>設定</h2>
      <div class="setting-row">
        <label><input type="checkbox" id="autoFavToggle"> 重要な差出人を自動で「よく使う相手」に追加する</label>
      </div>
      <div class="setting-row">
        <label>1アカウントの最大取得件数:
          <select id="limitSelect">
            <option value="100">100件</option>
            <option value="200">200件</option>
            <option value="300">300件</option>
            <option value="500">500件</option>
          </select>
        </label>
        <p class="hint">同期は過去1ヶ月分のメールを自動で全部取得します。この件数はその安全上限です(メールが非常に多い場合の保護)。</p>
      </div>
      <div class="setting-row">
        <h3>動作モード</h3>
        <p id="modeInfo" class="hint"></p>
      </div>
      <div class="setting-row">
        <h3>信頼済みの差出人 <span class="count" id="trustCount"></span></h3>
        <div id="trustList" class="chip-list"></div>
      </div>
      <div class="setting-row">
        <h3>ブロック済みの差出人 <span class="count" id="blockCount"></span></h3>
        <div id="blockList" class="chip-list"></div>
      </div>
    </div>
  </main>
</div>
<script src="/app.js"></script>
</body>
</html>
